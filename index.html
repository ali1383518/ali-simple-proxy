<!DOCTYPE html>
<html lang="fa">
<head>
    <meta charset="UTF-8">
    <title>پروکسی ساده من</title>
    <style>
        body { direction: rtl; font-family: Tahoma, sans-serif; max-width: 600px; margin: 50px auto; padding: 20px; background: #f0f0f0; }
        input, button { padding: 10px; margin: 5px; font-size: 16px; }
        input { width: 70%; }
        button { cursor: pointer; background-color: #007bff; color: white; border: none; border-radius: 5px; }
        iframe { width: 100%; height: 500px; margin-top: 20px; border: 1px solid #ccc; background: white; }
    </style>
</head>
<body>
    <h2>پروکسی ساده من (فقط برای تمرین!)</h2>
    <input type="text" id="urlInput" placeholder="آدرس سایت مورد نظر را وارد کنید (مثلاً https://example.com)">
    <button onclick="goToSite()">برو</button>
    <iframe id="siteFrame" srcdoc="<p style='text-align:center; padding:50px;'>صفحه در این کادر نمایش داده می‌شود.</p>"></iframe>

    <script>
        function goToSite() {
            let url = document.getElementById('urlInput').value;
            if (url && !url.startsWith('http')) {
                url = 'https://' + url;
            }
            if (url) {
                // به iframe می‌گوییم که آن آدرس را باز کند
                document.getElementById('siteFrame').src = url;
            } else {
                alert('لطفاً یک آدرس معتبر وارد کنید.');
            }
        }
    </script>
</body>
</html>
